when_to_use:
  - q: "When should I use EDATE instead of adding days to a date?"
    a: "Use EDATE when you need a date exactly N calendar months before or after a start date, preserving the day-of-month as closely as possible."
use_cases:
  - title: "Date 6 months after a start date"
    formula: "=EDATE(DATE(2023,1,15),6)"
    industries: [finance, operations]
industries: [finance, lending, real-estate]
related: [EOMONTH, DATE, DATEDIF, DAYS360]
