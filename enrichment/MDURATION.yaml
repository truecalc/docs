when_to_use:
  - q: "When should I use MDURATION instead of DURATION?"
    a: "Use MDURATION (Modified duration) to directly estimate the percentage price change of a bond for a 1% move in yield — it adjusts Macaulay duration by dividing by (1 + yield/frequency)."
use_cases:
  - title: "Modified duration of a long-dated bond"
    formula: "=MDURATION(DATE(2010,1,2),DATE(2039,12,31),0.03,1.2,2)"
    industries: [finance]
industries: [finance]
related: [DURATION, PRICE, YIELD]
