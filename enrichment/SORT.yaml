when_to_use:
  - q: "When should I use SORT?"
    a: "Use SORT to return a sorted copy of an array or range without modifying the original data, optionally specifying a sort column and ascending or descending order."
use_cases:
  - title: "Sort a list of numbers ascending"
    formula: "=SORT({3,1,4,1,5,9,2,6},1,TRUE)"
    industries: [operations, science]
industries: [operations, science]
related: [SORTBY, FILTER, UNIQUE]
