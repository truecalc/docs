when_to_use:
  - q: "When should I use DEC2HEX?"
    a: "Use DEC2HEX to convert a decimal integer to its hexadecimal (base-16) string representation, optionally zero-padded to a specified number of digits."
use_cases:
  - title: "Convert decimal 255 to hex with padding"
    formula: "=DEC2HEX(255, 4)"
    industries: [engineering]
industries: [engineering]
related: [HEX2DEC, DEC2BIN, DEC2OCT]
