when_to_use:
  - q: "When should I use WEEKDAY instead of DAY?"
    a: "Use WEEKDAY to get the day of the week (1-7) from a date; use DAY for the day-of-month number."
  - q: "What does the second argument of WEEKDAY control?"
    a: "It sets which day counts as 1. The default (1) starts the week on Sunday; type 2 starts it on Monday."
use_cases:
  - title: "Get the weekday number for a date"
    formula: "=WEEKDAY(DATE(2024, 3, 15))"
    industries: [operations, hr]
  - title: "Use Monday-start numbering for scheduling"
    formula: "=WEEKDAY(DATE(2024, 3, 15), 2)"
    industries: [operations, retail]
  - title: "Flag whether a date is a weekend"
    formula: "=IF(WEEKDAY(DATE(2024, 3, 16), 2) > 5, "weekend", "weekday")"
    industries: [hr, operations]
industries: [operations, hr, retail]
related: [DAY, WORKDAY, NETWORKDAYS, DATE]
