when_to_use:
  - q: "When should I use LOGINV?"
    a: "Use LOGINV to find the value at which the lognormal cumulative distribution equals a given probability — useful for modeling positively skewed quantities such as asset prices or biological measurements. LOGINV is the legacy alias for LOGNORM.INV; prefer LOGNORM.INV in new work."
use_cases:
  - title: "Lognormal value at 40th percentile"
    formula: "=LOGINV(0.4,4,6)"
    industries: [science, finance]
industries: [science, finance]
related: [LOGNORM.INV, LOGNORM.DIST, LOGINV, NORM.INV]
