when_to_use:
  - q: "When should I use PEARSON?"
    a: "Use PEARSON to measure the linear correlation between two numeric datasets — for example, to see how strongly advertising spend correlates with sales, or whether hours studied correlate with exam scores. The result ranges from -1 (perfect negative) to 1 (perfect positive)."
use_cases:
  - title: "Linear correlation between two measurement arrays"
    formula: "=PEARSON({2,3,9,1,8,7,5},{6,5,11,7,5,4,4})"
    industries: [science, operations]
industries: [science, operations]
related: [CORREL, RSQ, SLOPE, INTERCEPT]
