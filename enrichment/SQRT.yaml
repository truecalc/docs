when_to_use:
  - q: "When should I use SQRT instead of POWER?"
    a: "Use SQRT for the square root of a single value; it reads more clearly than POWER(x, 0.5). Use POWER when you need other roots or exponents."
  - q: "What happens if I pass a negative number to SQRT?"
    a: "SQRT returns the #NUM! error for negative inputs because there is no real square root. Wrap the argument with ABS first if you only care about magnitude."
use_cases:
  - title: "Square root of a number"
    formula: "=SQRT(144)"
    industries: [education, science]
  - title: "Irrational root used in geometry"
    formula: "=SQRT(2)"
    industries: [engineering, science]
  - title: "Hypotenuse length from two legs"
    formula: "=SQRT(POWER(3,2) + POWER(4,2))"
    industries: [engineering, real-estate]
industries: [education, science, engineering, real-estate]
related: [POWER, ABS, SUMSQ, SUMPRODUCT]
