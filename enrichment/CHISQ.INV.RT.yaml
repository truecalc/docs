when_to_use:
  - q: "When should I use CHISQ.INV.RT?"
    a: "Use CHISQ.INV.RT to find the chi-squared critical value whose right-tail probability equals p — the modern replacement for CHIINV, used to set rejection thresholds in hypothesis tests."
use_cases:
  - title: "Right-tail chi-squared critical value at 5% significance with 4 degrees of freedom"
    formula: "=CHISQ.INV.RT(0.05,4)"
    industries: [science, operations]
industries: [science, operations]
related: [CHISQ.INV, CHISQ.DIST.RT, CHIINV]
