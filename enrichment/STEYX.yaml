when_to_use:
  - q: "When should I use STEYX?"
    a: "Use STEYX to measure the standard error of the predicted y-values in a linear regression, giving you a sense of how accurately the regression line estimates individual data points."
use_cases:
  - title: "Standard error of predicted values in a regression"
    formula: "=STEYX({2,3,9,1,8,7,5},{6,5,11,7,5,4,4})"
    industries: [science, operations]
industries: [science, operations]
related: [SLOPE, INTERCEPT, RSQ, CORREL]
