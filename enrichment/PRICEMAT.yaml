when_to_use:
  - q: "When should I use PRICEMAT?"
    a: "Use PRICEMAT to calculate the price per $100 face value of a security that pays interest at maturity — useful for pricing zero-coupon or maturity-interest bonds where no periodic coupon is paid."
use_cases:
  - title: "Price of a maturity-interest bond"
    formula: "=PRICEMAT(DATE(2010,1,2),DATE(2039,12,31),DATE(2010,1,1),0.03,1.2)"
    industries: [finance]
industries: [finance]
related: [YIELDMAT, PRICE, RECEIVED]
