when_to_use:
  - q: "When should I use PDURATION?"
    a: "Use PDURATION to find out how many compounding periods an investment needs to grow from a present value to a target future value at a given rate — useful for goal-based savings planning."
use_cases:
  - title: "Periods to grow $10 to $15 at 25% per period"
    formula: "=PDURATION(0.25,10,15)"
    industries: [finance, personal-finance]
industries: [finance, personal-finance]
related: [NPER, FV, PV]
