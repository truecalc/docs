when_to_use:
  - q: "When should I use EPOCHTODATE?"
    a: "Use EPOCHTODATE to convert a Unix timestamp (seconds or milliseconds since 1970-01-01) into a spreadsheet date serial number for display or further date calculations."
use_cases:
