when_to_use:
  - q: "When should I use TZPARSE instead of TZDATETIME?"
    a: "Use TZPARSE when your input is already a timestamp string from an API, log file, or user form. Use TZDATETIME when you are constructing a timestamp from separate date and time components."
  - q: "What happens if the timestamp string has no timezone offset and I omit the zone argument?"
    a: "TZPARSE will return an error because it cannot determine the correct instant without a zone. Always supply the zone argument when parsing timestamps that may lack a zone annotation."
  - q: "Does TZPARSE accept both ISO 8601 and RFC-9557 formats?"
    a: "Yes. It accepts plain ISO 8601 strings like 2026-07-14T09:00:00-04:00 as well as RFC-9557 strings with a bracketed IANA zone name like 2026-07-14T09:00:00-04:00[America/New_York]."
use_cases:
  - title: "Parse an API timestamp with embedded UTC offset"
    formula: "=TZPARSE(\"2026-07-14T09:00:00-04:00\")"
    industries: [engineering, operations]
  - title: "Parse a log timestamp that lacks a zone using a fallback zone"
    formula: "=TZPARSE(\"2026-07-14T09:00:00\", \"America/Chicago\")"
    industries: [engineering, operations]
  - title: "Parse an RFC-9557 timestamp with a bracketed IANA zone name"
    formula: "=TZPARSE(\"2026-07-14T09:00:00-04:00[America/New_York]\")"
    industries: [engineering, operations]
industries: [engineering, operations]
related: [TZSTRING, TZDATETIME, TZFROMEPOCH, TZVALID]
