when_to_use:
  - q: "When should I use SWITCH instead of IFS?"
    a: "Use SWITCH when you are comparing one expression against several exact values; use IFS when each branch needs a different logical test."
  - q: "Can SWITCH have a default value?"
    a: "Yes — a final argument with no matching value acts as the default that SWITCH returns when nothing else matches."
use_cases:
  - title: "Map a number to a label with a default"
    formula: "=SWITCH(2,1,"one",2,"two","other")"
    industries: [operations, education]
  - title: "Convert a day number to a name"
    formula: "=SWITCH(3,1,"Mon",2,"Tue","Other")"
    industries: [operations, hr]
  - title: "Look up a code and return its value"
    formula: "=SWITCH("B","A",1,"B",2,0)"
    industries: [retail, sales]
industries: [operations, education, hr, retail, sales]
related: [IFS, IF, IFNA, VLOOKUP]
