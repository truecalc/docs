when_to_use:
  - q: "When should I use IMDIV?"
    a: "Use IMDIV to divide one complex number by another — required in AC impedance calculations, control system transfer functions, and any formula involving complex fractions."
use_cases:
  - title: "Divide complex numbers 4+2i by 1+i"
    formula: "=IMDIV("4+2i","1+i")"
