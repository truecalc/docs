when_to_use:
  - q: "When should I use YIELDMAT?"
    a: "Use YIELDMAT to calculate the annual yield of a security that pays all interest at maturity rather than through periodic coupons — appropriate for instruments like certain bonds or notes that accumulate interest and pay it in a lump sum."
use_cases:
  - title: "Annual yield of a long-term maturity-interest security at price 100.47"
    formula: "=YIELDMAT(DATE(2010,1,2),DATE(2039,12,31),DATE(2010,1,1),0.03,100.47)"
    industries: [finance]
industries: [finance]
related: [PRICEMAT, YIELD, YIELDDISC]
