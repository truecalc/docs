when_to_use:
  - q: "When should I use PRICEDISC?"
    a: "Use PRICEDISC to find the price of a discounted (zero-coupon) security given its discount rate — typical for Treasury bills and short-term instruments that don't pay periodic coupons."
use_cases:
  - title: "Price of a discounted security"
    formula: "=PRICEDISC(DATE(2010,1,2),DATE(2039,12,31),3,100)"
    industries: [finance]
industries: [finance]
related: [DISC, YIELDDISC, PRICE]
