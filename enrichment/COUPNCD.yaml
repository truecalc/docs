when_to_use:
  - q: "When should I use COUPNCD?"
    a: "Use COUPNCD to find the exact date of the next coupon payment after the settlement date — helpful when scheduling cash-flow projections for bond portfolios."
use_cases:
  - title: "Next coupon date for a bond"
    formula: "=COUPNCD(DATE(2010,2,1),DATE(2019,12,31),4)"
    industries: [finance]
industries: [finance]
related: [COUPPCD, COUPNUM, COUPDAYSNC]
