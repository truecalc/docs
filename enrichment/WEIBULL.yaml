when_to_use:
  - q: "When should I use WEIBULL?"
    a: "WEIBULL is the legacy Weibull distribution function; use it only when maintaining older spreadsheets — for new reliability or failure-rate analysis, prefer WEIBULL.DIST which has identical behavior but a consistent modern name."
use_cases:
  - title: "Cumulative Weibull failure probability (legacy)"
    formula: "=WEIBULL(2.4,2,3,TRUE)"
    industries: [engineering, operations]
