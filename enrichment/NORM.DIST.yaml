when_to_use:
  - q: "When should I use NORM.DIST?"
    a: "Use NORM.DIST to calculate the probability that a normally distributed variable falls at or below a given value (cumulative=TRUE), or the probability density at that value (cumulative=FALSE) — useful for grading on a curve, process capability, or confidence interval calculations."
use_cases:
  - title: "Cumulative probability at x=2.4 with mean=1 and stdev=4"
    formula: "=NORM.DIST(2.4,1,4,TRUE)"
    industries: [science, operations]
industries: [science, operations]
related: [NORM.INV, NORM.S.DIST, NORMDIST, NORM.S.INV]
