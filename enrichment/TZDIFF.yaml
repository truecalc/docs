when_to_use:
  - q: "When should I use TZDIFF instead of subtracting two date serials?"
    a: "Use TZDIFF when the two timestamps are in different time zones or span a DST transition. Serial subtraction counts wall-clock ticks and can be off by an hour; TZDIFF works on the absolute UTC timeline so it always returns real elapsed time."
  - q: "What happens when TZDIFF is called across a daylight-saving boundary?"
    a: "TZDIFF ignores DST changes entirely and counts only real elapsed seconds on the UTC timeline, so a one-hour clock-change has no effect on the result."
  - q: "Which unit should I choose for cross-zone SLA or latency measurements?"
    a: "Use \"minutes\" or \"seconds\" for precise SLA checks, \"hours\" for shift or flight durations, and \"days\" for multi-day turnaround reporting."
use_cases:
  - title: "Measure flight duration between departure and arrival zones"
    formula: "=TZDIFF(TZDATETIME(2024, 6, 15, 11, 30, 0, \"America/Los_Angeles\"), TZDATETIME(2024, 6, 15, 8, 0, 0, \"America/New_York\"), \"hours\")"
    industries: [logistics, operations]
  - title: "Calculate SLA breach time in minutes between two cities"
    formula: "=TZDIFF(TZDATETIME(2024, 3, 10, 14, 45, 0, \"Europe/Berlin\"), TZDATETIME(2024, 3, 10, 9, 0, 0, \"America/New_York\"), \"minutes\")"
    industries: [operations, finance]
  - title: "Compute elapsed days for a multi-region trade settlement"
    formula: "=TZDIFF(TZDATETIME(2024, 11, 5, 17, 0, 0, \"Asia/Tokyo\"), TZDATETIME(2024, 11, 1, 9, 30, 0, \"America/New_York\"), \"days\")"
    industries: [finance, logistics]
industries: [finance, operations, logistics]
related: [TZADD, TZOFFSETDIFF, TZCONVERT, TZDATETIME]
