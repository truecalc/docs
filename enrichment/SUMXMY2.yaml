when_to_use:
  - q: "When should I use SUMXMY2?"
    a: "Use SUMXMY2 to measure the total squared difference between two parallel arrays — useful in regression analysis and error metrics where you want the sum of (x − y)² for each pair."
use_cases:
  - title: "Sum of squared differences between two datasets"
    formula: "=SUMXMY2({1,2,3},{4,5,6})"
    industries: [science, engineering]
industries: [science]
related: [SUMX2PY2, SUMX2MY2, SUMSQ]
