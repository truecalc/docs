when_to_use:
  - q: "When should I use TZNOW instead of NOW()?"
    a: "Use TZNOW when you need a zone-aware timestamp that carries its timezone with it. NOW() returns a plain serial number with no zone context, while TZNOW returns a true instant tied to a specific IANA zone, preventing ambiguity across regions."
  - q: "Will different cells calling TZNOW get different times in the same recalc?"
    a: "No. TZNOW pins the clock at recalc-start, so every cell that calls TZNOW during a single recalc pass sees the identical instant, ensuring consistency across your workbook."
  - q: "What happens if I pass an invalid IANA zone to TZNOW?"
    a: "TZNOW returns an error if the zone string is not a valid IANA timezone identifier. Always use canonical names like \"America/New_York\" or \"Europe/London\" rather than abbreviations like \"EST\"."
use_cases:
  - title: "Stamp current time in a specific headquarters timezone"
    formula: "=TZNOW(\"America/Chicago\")"
    industries: [operations, logistics]
  - title: "Convert current moment from UTC to Tokyo local time"
    formula: "=TZCONVERT(TZNOW(\"UTC\"), \"Asia/Tokyo\")"
    industries: [engineering, operations]
  - title: "Check whether the current moment falls within business hours"
    formula: "=TZINWINDOW(TZNOW(\"Europe/London\"), \"09:00\", \"17:00\")"
    industries: [logistics, operations]
industries: [operations, engineering, logistics]
related: [TZCONVERT, TZDIFF, TZINWINDOW, TZDATETIME]
