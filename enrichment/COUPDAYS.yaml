when_to_use:
  - q: "When should I use COUPDAYS?"
    a: "Use COUPDAYS to get the total number of days in the coupon period that contains the settlement date — needed when prorating accrued interest on a bond."
use_cases:
  - title: "Total days in settlement coupon period"
    formula: "=COUPDAYS(DATE(2010,2,1),DATE(2019,12,31),4)"
    industries: [finance]
industries: [finance]
related: [COUPDAYBS, COUPDAYSNC, COUPNCD]
