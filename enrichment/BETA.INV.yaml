when_to_use:
  - q: "When should I use BETA.INV?"
    a: "Use BETA.INV to find the value at which the beta CDF equals a given probability, which is the inverse operation of BETA.DIST and useful for computing credible intervals."
use_cases:
  - title: "Find the beta inverse CDF at probability 0.3"
    formula: "=BETA.INV(0.3,5,1)"
    industries: [science, operations]
industries: [science, operations]
related: [BETA.DIST, NORM.INV, PERCENTILE]
