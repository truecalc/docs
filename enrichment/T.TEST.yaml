when_to_use:
  - q: "When should I use T.TEST?"
    a: "Use T.TEST when you want to compare the means of two datasets and get a p-value indicating whether the difference is statistically significant — you specify the number of tails (1 or 2) and the test type (paired, equal-variance, or unequal-variance)."
use_cases:
  - title: "Two-tailed paired t-test between two score sets"
    formula: "=T.TEST({90,85,78,92},{88,82,80,95},2,1)"
    industries: [science, education]
industries: [science, education]
related: [T.DIST.2T, Z.TEST, VAR.S]
