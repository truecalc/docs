when_to_use:
  - q: "When should I use GAUSS?"
    a: "Use GAUSS to get the probability that a standard normal variable falls between 0 and x, equivalent to NORM.S.DIST(x,TRUE) - 0.5, useful in symmetric probability calculations."
use_cases:
  - title: "Probability between mean and one standard deviation"
    formula: "=GAUSS(1)"
    industries: [science, operations]
industries: [science, operations]
related: [NORM.S.DIST, NORM.DIST, PHI]
