when_to_use:
  - q: "When should I use PERCENTRANK?"
    a: "Use PERCENTRANK to find the relative standing of a specific value within a dataset as a percentage — for example, what percentile a student's score falls in, or where a product's price sits relative to competitors. The result is a value from 0 to 1."
use_cases:
  - title: "Percentile rank of value 3 in a 1-5 dataset"
    formula: "=PERCENTRANK({1,2,3,4,5},3)"
    industries: [education, operations]
industries: [education, operations]
related: [PERCENTRANK.INC, PERCENTRANK.EXC, PERCENTILE, RANK.EQ]
