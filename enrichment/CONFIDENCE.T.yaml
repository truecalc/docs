when_to_use:
  - q: "When should I use CONFIDENCE.T?"
    a: "Use CONFIDENCE.T to compute the half-width of a confidence interval when the population standard deviation is unknown and you are using the t-distribution — appropriate for small samples."
use_cases:
  - title: "95% confidence interval half-width using t-dist with stdev 6.43 and n=27"
    formula: "=CONFIDENCE.T(0.05,6.43,27)"
    industries: [science, operations]
industries: [science, operations]
related: [CONFIDENCE.NORM, CONFIDENCE, T.INV]
