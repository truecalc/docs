when_to_use:
  - q: "When should I use INTERCEPT?"
    a: "Use INTERCEPT to find the y-intercept of the least-squares regression line through known data points, which represents the predicted y-value when x equals zero."
use_cases:
  - title: "Y-intercept of a regression line"
    formula: "=INTERCEPT({2,3,9,1,8},{6,5,11,7,5})"
    industries: [science, operations]
industries: [science, operations]
related: [SLOPE, FORECAST, FORECAST.LINEAR, CORREL]
