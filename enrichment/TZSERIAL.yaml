when_to_use:
  - q: "When should I use TZSERIAL instead of reading the value directly from TZDATETIME?"
    a: "Use TZSERIAL when you need to pass a zone-aware value into ordinary date/time functions like YEAR(), MONTH(), HOUR(), or MINUTE() that only accept plain serial numbers, not zoned values."
  - q: "What is the difference between TZSERIAL and TZSTRING?"
    a: "TZSERIAL drops the zone and returns the wall-clock time as a numeric serial number suitable for arithmetic and built-in date functions, while TZSTRING returns a human-readable text representation of the zoned datetime."
  - q: "What happens to the timezone offset when I call TZSERIAL?"
    a: "The offset is discarded entirely. TZSERIAL returns the local wall-clock time as-is, so 09:30 in Tokyo and 09:30 in London both return the same serial number representing 09:30."
use_cases:
  - title: "Extract the hour from a zone-aware datetime"
    formula: "=HOUR(TZSERIAL(TZDATETIME(2024, 6, 15, 9, 30, 0, \"America/New_York\")))"
    industries: [operations, engineering]
  - title: "Get the day of the month from a zoned value"
    formula: "=DAY(TZSERIAL(TZDATETIME(2024, 3, 27, 14, 0, 0, \"Europe/London\")))"
    industries: [finance, operations]
  - title: "Calculate days remaining in the month using a zoned datetime"
    formula: "=EOMONTH(TZSERIAL(TZDATETIME(2024, 11, 10, 8, 0, 0, \"Asia/Tokyo\")), 0) - TZSERIAL(TZDATETIME(2024, 11, 10, 8, 0, 0, \"Asia/Tokyo\"))"
    industries: [finance, engineering]
industries: [operations, finance, engineering]
related: [TZLOCALIZE, TZPART, TZSTRING, TZDATETIME]
