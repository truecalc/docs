when_to_use:
  - q: "When should I use TRANSPOSE?"
    a: "Use TRANSPOSE to swap the rows and columns of an array — useful when data arrives in row orientation but downstream formulas expect column orientation, or vice versa."
use_cases:
  - title: "Swap rows and columns of a 2×3 matrix"
    formula: "=TRANSPOSE({1,2,3;4,5,6})"
    industries: [operations, science]
industries: [operations, science]
related: [TOCOL, TOROW, VSTACK]
