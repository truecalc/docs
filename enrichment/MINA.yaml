when_to_use:
  - q: "When should I use MINA instead of MIN?"
    a: "Use MINA when your range may contain logical values (TRUE/FALSE) or text strings and you want them counted — MINA treats TRUE as 1, FALSE and text as 0, so a text cell can become the minimum. MIN silently ignores non-numeric cells."
use_cases:
  - title: "Minimum value across multiple arrays"
    formula: "=MINA({1,2,3,4,5},26,4)"
    industries: [operations, science]
industries: [operations, science]
related: [MIN, MAXA, MAX, SMALL]
