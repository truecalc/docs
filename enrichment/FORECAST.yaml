when_to_use:
  - q: "When should I use FORECAST?"
    a: "Use FORECAST to predict a future value along a linear trend given a set of known x and y values, such as estimating next month's sales from historical data."
use_cases:
  - title: "Predict a y-value from a linear trend"
    formula: "=FORECAST(5,{2,4,6,8,10},{1,2,3,4,5})"
    industries: [sales, operations]
industries: [sales, operations]
related: [FORECAST.LINEAR, SLOPE, INTERCEPT, TREND]
