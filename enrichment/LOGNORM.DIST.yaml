when_to_use:
  - q: "When should I use LOGNORM.DIST?"
    a: "Use LOGNORM.DIST when your data is positively skewed and cannot go below zero — such as asset prices, incomes, or species population sizes. Supply cumulative=TRUE for the probability that the random variable is at most x, or FALSE for the probability density at x."
use_cases:
  - title: "Cumulative lognormal probability at x=4"
    formula: "=LOGNORM.DIST(4,4,6,TRUE)"
    industries: [science, finance]
industries: [science, finance]
related: [LOGNORM.INV, NORM.DIST, LOGINV, LOGNORMDIST]
