when_to_use:
  - q: "What does EOMONTH return?"
    a: "EOMONTH returns the date of the last day of a month, offset by the number of months you specify. A zero offset gives the end of the start date's own month."
  - q: "How do I get the end of the current month or a future month?"
    a: "Pass 0 as the second argument for the same month, a positive number for months ahead, or a negative number for months behind the start date."
use_cases:
  - title: "End of the current month"
    formula: "=EOMONTH(DATE(2024, 2, 15), 0)"
    industries: [finance, operations]
  - title: "Find a loan's due date three months out"
    formula: "=EOMONTH(DATE(2024, 1, 10), 3)"
    industries: [lending, finance]
  - title: "Get the end of the prior month for a closing period"
    formula: "=EOMONTH(DATE(2024, 6, 30), -1)"
    industries: [finance, real-estate]
industries: [finance, operations, lending, real-estate]
related: [YEAR, MONTH, DAY, DATE]
