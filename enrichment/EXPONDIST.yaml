when_to_use:
  - q: "When should I use EXPONDIST?"
    a: "Use EXPONDIST to compute the exponential distribution PDF or CDF — it is the legacy equivalent of EXPON.DIST, retained for compatibility with older spreadsheets."
use_cases:
