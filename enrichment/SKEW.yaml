when_to_use:
  - q: "When should I use SKEW?"
    a: "Use SKEW to measure the asymmetry of a sample distribution; a positive result indicates a right-tailed distribution while a negative result indicates a left-tailed distribution, which is important when evaluating income distributions, test scores, or financial returns."
use_cases:
  - title: "Skewness of a sample dataset"
    formula: "=SKEW({2,5,8,13,10,18,23,26})"
    industries: [science, finance]
industries: [science, finance]
related: [SKEW.P, KURT, STDEV.S, AVERAGE]
