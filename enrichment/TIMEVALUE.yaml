when_to_use:
  - q: "When should I use TIMEVALUE?"
    a: "Use TIMEVALUE to parse a time string such as 2:15 PM or 14:15:30 into a fractional serial number (0 to 1) so you can perform arithmetic on it."
use_cases:
  - title: "Parse an afternoon time string to a serial number"
    formula: "=TIMEVALUE("2:15 PM")"
    industries: [operations, engineering]
industries: [operations]
related: [TIME, HOUR, MINUTE, SECOND, DATEVALUE]
