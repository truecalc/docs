when_to_use:
  - q: "When should I use VARPA?"
    a: "Use VARPA when you need population variance and your range might include text (counted as 0) or logical values (TRUE=1, FALSE=0) that should contribute to the calculation — it is the population counterpart of VARA."
use_cases:
  - title: "Population variance including all value types"
    formula: "=VARPA(2,4,4,4,5,5,7,9)"
    industries: [science, operations]
industries: [science, operations]
related: [VAR.P, VARA, VARP]
