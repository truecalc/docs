when_to_use:
  - q: "When should I use HOUR?"
    a: "Use HOUR to extract the hour component (0–23) from a time serial number or time string, for example to classify events into morning, afternoon, or evening buckets."
use_cases:
  - title: "Extract the hour from a constructed time"
    formula: "=HOUR(TIME(11,40,59))"
    industries: [operations, engineering]
industries: [operations, engineering]
related: [MINUTE, SECOND, TIME, TIMEVALUE]
