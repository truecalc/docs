when_to_use:
  - q: "When should I use ISZONED instead of just calling a timezone function directly?"
    a: "Use ISZONED to guard a formula that may receive either a plain date serial or a zoned instant, so you can branch logic and avoid passing an unzoned value to a function like TZCONVERT that requires a zoned input."
  - q: "What does ISZONED return for a plain number or a text string?"
    a: "ISZONED returns FALSE for plain numbers, text, dates created without a timezone, and errors — only values produced by TZDATETIME, TZCONVERT, or similar zone-aware functions return TRUE."
  - q: "Can I use ISZONED to validate user-provided values before further timezone calculations?"
    a: "Yes. Wrap ISZONED in an IF to detect whether a value is zone-aware and fall back to a safe default or localization step when it is not."
use_cases:
  - title: "Check whether a timestamp is zone-aware before converting"
    formula: "=ISZONED(TZDATETIME(2024, 3, 10, 9, 0, 0, \"America/New_York\"))"
    industries: [engineering, operations]
  - title: "Branch logic based on whether a value is zoned"
    formula: "=IF(ISZONED(TZDATETIME(2024, 6, 15, 14, 30, 0, \"Europe/London\")), \"zoned\", \"plain\")"
    industries: [engineering, finance]
  - title: "Confirm a localized instant is recognized as zoned"
    formula: "=ISZONED(TZLOCALIZE(45000, \"Asia/Tokyo\"))"
    industries: [engineering, logistics]
industries: [engineering, operations, finance]
related: [TZLOCALIZE, TZDATETIME, TZVALID, TZCONVERT, TZOFFSET]
