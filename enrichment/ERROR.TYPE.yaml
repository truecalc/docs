when_to_use:
  - q: "When should I use ERROR.TYPE?"
    a: "Use ERROR.TYPE to identify which specific error a formula produced — it returns a number (1=#NULL!, 2=#DIV/0!, 3=#VALUE!, etc.) so you can branch on the error kind in IF or SWITCH logic."
use_cases:
  - title: "Identify a division-by-zero error"
    formula: "=ERROR.TYPE(1/0)"
    industries: [operations]
industries: [operations]
related: [ISERROR, ISERR, ISNA, IFERROR]
