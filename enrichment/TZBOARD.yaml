when_to_use:
  - q: "When should I use TZBOARD instead of TZWORLDCLOCK?"
    a: "Use TZBOARD when you need structured data — one record per zone with fields like offset, delta, abbreviation, and DST flag — so you can render your own table, feed a dashboard component, or pass the result to downstream code. Use TZWORLDCLOCK when you only need a human-readable sentence summarizing the same zones."
  - q: "What does the delta field in TZBOARD output represent?"
    a: "Delta is the signed hour difference between each listed zone and the anchor zone. It lets you quickly see how far ahead or behind each zone is relative to your reference point, which is useful for scheduling meetings or computing deadlines across offices."
  - q: "What happens if I pass a zone identifier that TZBOARD does not recognize?"
    a: "TZBOARD returns #VALUE! for unrecognized zone identifiers. Use TZVALID to check a zone string before passing it to TZBOARD if your zone names come from user input or external data."
use_cases:
  - title: "Build a world-clock board anchored to New York for three global offices"
    formula: "=TZBOARD(TZDATETIME(2025, 6, 15, 9, 0, 0, \"America/New_York\"), \"Europe/London\", \"Asia/Tokyo\", \"Australia/Sydney\")"
    industries: [engineering, operations]
  - title: "Generate a financial-markets status board anchored to London open"
    formula: "=TZBOARD(TZDATETIME(2025, 3, 17, 8, 0, 0, \"Europe/London\"), \"America/New_York\", \"Asia/Hong_Kong\", \"Asia/Tokyo\")"
    industries: [finance, operations]
  - title: "Produce an on-call handoff board anchored to UTC midnight"
    formula: "=TZBOARD(TZDATETIME(2025, 9, 1, 0, 0, 0, \"UTC\"), \"America/Los_Angeles\", \"Europe/Berlin\", \"Asia/Kolkata\")"
    industries: [engineering, operations]
industries: [engineering, operations, finance]
related: [TZWORLDCLOCK, TZCONVERT, TZOFFSET, TZABBR, TZISDST]
