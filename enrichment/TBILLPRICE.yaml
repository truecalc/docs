when_to_use:
  - q: "When should I use TBILLPRICE?"
    a: "Use TBILLPRICE to find the price per $100 face value of a Treasury bill given its discount rate — useful for determining how much to pay for a T-bill in the secondary market."
use_cases:
  - title: "T-bill price at 1.25% discount rate"
    formula: "=TBILLPRICE(DATE(2010,1,2),DATE(2010,12,31),0.0125)"
    industries: [finance]
industries: [finance]
related: [TBILLYIELD, TBILLEQ, DISC]
