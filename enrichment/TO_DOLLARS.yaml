when_to_use:
  - q: "When should I use TO_DOLLARS?"
    a: "Use TO_DOLLARS to apply dollar currency formatting to a numeric value, making it display as a monetary amount in reports or dashboards."
use_cases:
  - title: "Format a number as a dollar amount"
    formula: "=TO_DOLLARS(3.14)"
    industries: [finance, personal-finance]
related: [TO_PERCENT, TO_TEXT, TEXT]
