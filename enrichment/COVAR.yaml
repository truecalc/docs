when_to_use:
  - q: "When should I use COVAR?"
    a: "Use COVAR to compute the population covariance between two data sets — a legacy equivalent of COVARIANCE.P that measures how two variables vary together."
use_cases:
  - title: "Population covariance between two small data sets (legacy)"
    formula: "=COVAR({2,5,7,1,8},{4,3,6,1,5})"
    industries: [finance, science]
industries: [finance, science]
related: [COVARIANCE.P, COVARIANCE.S, CORREL]
