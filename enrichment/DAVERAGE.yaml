when_to_use:
  - q: "When should I use DAVERAGE?"
    a: "Use DAVERAGE to compute the average of a field across only the rows in a database table that match one or more criteria — useful when you need a conditional average over a structured table rather than a flat range."
use_cases:
  - title: "Average score for students above 75"
    formula: "=DAVERAGE({"Name","Score";"Alice",80;"Bob",90;"Carol",70},"Score",{"Score";">75"})"
    industries: [education, operations]
industries: [operations, education]
related: [DSUM, DCOUNT, AVERAGEIF]
