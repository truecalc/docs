when_to_use:
  - q: "When should I use PERCENTILE.EXC instead of PERCENTILE.INC?"
    a: "Use PERCENTILE.EXC when you need the exclusive percentile, where k must be strictly between 0 and 1 (endpoints excluded). This matches some statistical conventions — for example, rank-based methods that treat boundary percentiles as undefined."
use_cases:
  - title: "40th exclusive percentile of a five-value set"
    formula: "=PERCENTILE.EXC({15,20,35,40,50},0.4)"
    industries: [science, operations]
industries: [science, operations]
related: [PERCENTILE.INC, PERCENTILE, QUARTILE.EXC, MEDIAN]
