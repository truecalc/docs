name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: gen-docs drift check
        run: |
          node scripts/gen-docs.mjs
          git diff --exit-code -- content/docs/reference/functions

      - name: test-docs (Learn examples)
        run: node scripts/test-docs.mjs

      - name: Build (static export)
        run: npm run build
